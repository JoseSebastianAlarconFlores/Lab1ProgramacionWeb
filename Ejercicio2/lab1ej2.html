<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5"> 
        <h1 class="text-center">CALCULADORA</h1>
        <p>Jose Sebastian Alarcon Flores</p>
        <div class="card p-4 shadow">
            <div class="form-group">
                <label>Primer número:</label>
                <input type="text" id="num1" class="form-control" placeholder="0"> </div>
            <div class="form-group">
                <label>Segundo número:</label>
                <input type="text" id="num2" class="form-control" placeholder="0">
            </div>
            <div class="d-flex justify-content-between mt-3">
                <button id="btn-sumar" class="btn btn-primary">Sumar</button>
                <button id="btn-restar" class="btn btn-secondary">Restar</button>
                <button id="btn-mult" class="btn btn-success">Multiplicar</button>
                <button id="btn-div" class="btn btn-danger">Dividir</button>
            </div>
            <div class="form-group mt-4">
                <label>Resultado Final:</label>
                <input type="text" id="resultado" class="form-control" readonly> </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="labej2.js"></script>
</body>
</html>
