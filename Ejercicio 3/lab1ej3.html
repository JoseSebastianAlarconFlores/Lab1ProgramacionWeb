<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="col-lg-6 col-md-6 mb-4">
        <div class="login-area">
            <div class="tab-content nav">
                <form id="login" class="tab-pane active col-12">
                    <h4 class="m-b5">Login</h4>
                    <small class="font-weight-600 m-b20 d-block">If you have an account with us, please log in.</small>
                    <div class="mb-4">
                        <label class="label-title">E-MAIL *</label>
                        <input name="dzName" required="" class="form-control" placeholder="Your Email Id" type="email">
                    </div>
                    <div class="mb-4">
                        <label class="label-title">PASSWORD *</label>
                        <input name="dzName" required="" class="form-control " placeholder="Type Password"
                            type="password">
                    </div>
                    <div class="text-left">
                        <button class="btn btn-primary me-2">login</button>
                        <a data-bs-toggle="tab" href="#forgot-password" class="m-l5"><i class="fas fa-unlock-alt"></i>
                            Forgot Password</a>
                    </div>
                </form>
                <form id="forgot-password" class="tab-pane fade  col-12">
                    <h4 class="m-b5">Forget Password ?</h4>
                    <small class="font-weight-600 m-b20 d-block">We will send you an email to reset your password.
                    </small>
                    <div class="mb-3">
                        <label class="label-title">E-MAIL *</label>
                        <input name="dzName" required="" class="form-control" placeholder="Your Email Id" type="email">
                    </div>
                    <div class="text-left">
                        <a class="btn btn-outline-secondary m-r10" data-bs-toggle="tab" href="#login">Back</a>
                        <button class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="login.js"></script>
</body>

</html>
